    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        :root { --primary: #FF6B00; --bg: #000; --text: #FFF; --transition: all 0.3s ease; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Cairo', sans-serif; overflow-x: hidden; }
        
        /* --- الملاحة الموحدة (المسطرة) --- */
        nav { position: fixed; top: 0; width: 100%; height: 100px; padding: 0 8%; display: flex; justify-content: space-between; align-items: center; z-index: 1000; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,107,0,0.1); }
        .logo img { height: 65px; width: auto; filter: drop-shadow(0 0 10px rgba(255, 107, 0, 0.3)); }
        .nav-links { display: flex; gap: 30px; list-style: none; align-items: center; }
        .nav-links a { color: var(--text); text-decoration: none; font-weight: 700; font-size: 16px; transition: var(--transition); }
        .nav-links a:hover, .active { color: var(--primary) !important; }

        /* Hero */
        .hero { height: 100vh; display: grid; grid-template-columns: 1fr 1fr; align-items: center; padding: 0 8%; }
        .hero-img-box { height: 100%; display: flex; align-items: center; justify-content: center; }
        .hero-img-box img { width: 100%; height: 100%; object-fit: cover; mask-image: radial-gradient(circle at center, black 45%, transparent 90%); -webkit-mask-image: radial-gradient(circle at center, black 45%, transparent 90%); filter: grayscale(100%) brightness(0.7); transition: 0.5s; }
        .hero-img-box:hover img { filter: grayscale(0%) brightness(1.2); }
        .hero-text-box { padding-right: 5%; }
        .hero h1 { font-size: clamp(2.5rem, 5vw, 4rem); font-weight: 900; line-height: 1.2; margin-bottom: 20px; }
        .hero h1 span { color: var(--primary); }

        /* Footer & Social Icons Glow */
        footer { padding: 80px 8% 40px; border-top: 1px solid #111; text-align: center; }
        .footer-logo img { height: 90px; margin-bottom: 30px; }
        .social-grid { display: flex; justify-content: center; gap: 20px; margin: 30px 0; flex-wrap: wrap; }
        .social-link { width: 60px; height: 60px; background: #111; display: flex; align-items: center; justify-content: center; color: white; font-size: 24px; border-radius: 15px; text-decoration: none; transition: var(--transition); border: 1px solid #222; }
        .social-link:hover { background: var(--primary); transform: translateY(-8px); box-shadow: 0 0 20px var(--primary); border-color: var(--primary); color: #fff; }

        /* WhatsApp Fixed */
        .wa-fixed { position: fixed; bottom: 30px; left: 30px; background: var(--primary); color: white; width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 35px; z-index: 1000; text-decoration: none; box-shadow: 0 10px 25px rgba(255, 107, 0, 0.4); transition: 0.3s; }
        .wa-fixed:hover { transform: scale(1.1) rotate(10deg); }

        @media (max-width: 992px) { .hero { grid-template-columns: 1fr; padding-top: 100px; text-align: center; } .hero-img-box { height: 350px; } .nav-links { display: none; } }
    </style>
</head>
